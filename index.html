<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <title>Gestionnaire de contacts</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

  <h1>Mes Contacts</h1>

  <form id="formulaire">

  <ul id="liste-contacts"></ul>

  <script src="app.js"></script>
</body>
</html>
